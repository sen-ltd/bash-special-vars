<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bash 変数リファレンス</title>
  <meta name="description" content="Bash 特殊変数・パラメータ展開の完全リファレンス。$@, ${var:-default}, 配列など 40+ エントリ、日英併記。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <h1 id="page-title">Bash 変数リファレンス</h1>
        <p id="page-subtitle" class="subtitle">特殊変数・パラメータ展開の完全ガイド</p>
      </div>
      <div class="header-controls">
        <button id="lang-toggle" class="icon-btn" aria-label="Switch language">EN</button>
        <button id="theme-toggle" class="icon-btn" aria-label="Switch to light mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Search ── -->
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="search-input"
          type="search"
          placeholder="変数名または説明で検索（例: $@, default, 配列）"
          aria-label="Bash 変数を検索"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <!-- ── Category filter chips ── -->
      <div id="filter-chips" class="filter-chips" role="group" aria-label="カテゴリでフィルター">
        <button class="filter-chip active" data-category="all">すべて</button>
        <button class="filter-chip" data-category="positional">位置パラメータ</button>
        <button class="filter-chip" data-category="special">特殊パラメータ</button>
        <button class="filter-chip" data-category="expansion">パラメータ展開</button>
        <button class="filter-chip" data-category="env">環境変数</button>
        <button class="filter-chip" data-category="array">配列</button>
        <button class="filter-chip" data-category="process">プロセス情報</button>
      </div>

      <p class="result-count"><span id="var-count"></span></p>
    </div>
  </div>

  <!-- ── Card grid ── -->
  <main class="main-content">
    <div id="var-grid" class="var-grid" role="list" aria-live="polite" aria-atomic="false"></div>
  </main>

  <!-- ── Modal ── -->
  <div id="var-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="modal-title-text" class="modal-title-text">変数の詳細</h2>
        <button id="modal-close-btn" class="modal-close" aria-label="閉じる">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
